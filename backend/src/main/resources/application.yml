spring:
  datasource:
    url: jdbc:sqlite:expense_tracker.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration-ms: 86400000 # 24 hours
    refresh-expiration-ms: 604800000 # 7 days
  cors:
    allowed-origins: "http://localhost:5173,http://localhost:3000,http://localhost:80,http://localhost"
  gemini:
    api-key: ${GEMINI_API_KEY:demo-key}
    api-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

server:
  port: 8080
